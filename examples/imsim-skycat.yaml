modules:
    - imsim

template: imsim-config-skycat

input.sky_catalog.obj_types: [satellite_streaks]

# Disable the atmospheric PSF to run faster for testing.
input.atm_psf: ""
psf:
    type: Convolve
    items:
        -
           type: Gaussian
           fwhm: 0.8
        -
           type: Gaussian
           fwhm: 0.3

# Turn off check pointing:
input.checkpoint: ""

input.sky_catalog.file_name: ./skyCatalog.yaml
input.opsim_data.file_name: $os.environ.get('IMSIM_DIR')+'/data/small_opsim.db'
input.opsim_data.visit: 24071
image.nobjects: 10
#image.sky_level: 0
image.random_seed: 42

output.dir: output
output.det_num.first: 94
output.nproc: 1
output.nfiles: 1
output.readout: ""
